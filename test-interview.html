<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>面试API测试</title>
<style>body{font-family:"PingFang SC",sans-serif;background:#0a0a14;color:#e8e8f0;padding:40px;max-width:700px;margin:0 auto}.s{background:#0f0f1e;border:1px solid rgba(255,255,255,0.1);color:#e8e8f0;width:100%;min-height:80px;padding:12px;border-radius:8px;font-size:14px;margin:12px 0}.btn{background:linear-gradient(135deg,#a78bfa,#818cf8);color:#fff;border:none;padding:14px 28px;border-radius:10px;font-size:16px;cursor:pointer;width:100%}.btn:hover{opacity:0.9}.out{background:#0f0f1e;border:1px solid rgba(255,255,255,0.1);padding:16px;border-radius:8px;white-space:pre-wrap;margin-top:16px;min-height:100px;font-size:14px;line-height:1.6}</style></head>
<body>
<h1>🤖 面试Agent API测试</h1>
<p style="color:#9ca3af;margin:8px 0 24px">发一条消息给面试Agent，看流式SSE返回</p>
<textarea class="s" id="inp">[匹配结果] 厂级:中厂 岗位:产品助理 方向:AI产品经理 技能:原型✅ SQL⚠️ AB测试❌
[简历原文] 985本科计算机专业，有一段字节跳动产品实习生经历，会用SQL和Figma。</textarea>
<button class="btn" id="btn" onclick="test()">🚀 发送测试</button>
<div style="color:#9ca3af;font-size:13px;margin:8px 0" id="status"></div>
<div class="out" id="out">等待发送……</div>

<script>
const AK="sk-ws-H.RPPMMLP.CLts.MEUCIAhjyUzh3NiGKcgeaDzlenO4SypPEP0aCjWsOVh40UAFAiEA_9Oe38OS4jWXr1e760LZku-JTFgu81MrQ9zFlzd8Hx4";
const URL="https://dashscope.aliyuncs.com/api/v1/apps/76a51d9b50a0497ab0f5c753fb0d9a3d/completions";

async function test(){
  var inp=document.getElementById("inp").value.trim();
  if(!inp)return;
  var btn=document.getElementById("btn"),st=document.getElementById("status"),out=document.getElementById("out");
  btn.disabled=true;btn.textContent="⏳ 发送中…";st.textContent="";out.textContent="";
  var start=Date.now();
  try{
    var r=await fetch(URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+AK},body:JSON.stringify({input:{messages:[{role:"user",content:inp}]},parameters:{stream:true}})});
    st.textContent="✅ 已连接 · HTTP "+r.status+" · 开始接收流式数据……";
    var reader=r.body.getReader(),dec=new TextDecoder(),full="";
    while(true){var{value,done}=await reader.read();if(done)break;
      var text=dec.decode(value),lines=text.split("\n");
      for(var i=0;i<lines.length;i++){var l=lines[i];if(l.indexOf("data:")===0){
        var d=l.slice(5).trim();if(d==="[DONE]")break;
        try{var j=JSON.parse(d);full+=j.output?j.output.text||"":""}catch(e){}}}
      out.textContent=full;
    }
    var t=((Date.now()-start)/1000).toFixed(1);
    st.textContent="✅ 完成 · 总耗时 "+t+"s · 共 "+full.length+" 字";
  }catch(e){
    st.textContent="❌ 失败";
    out.textContent="错误："+e.message;
  }
  btn.disabled=false;btn.textContent="🚀 再测一次";
}
</script>
</body></html>
